<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AUEM | Smart Rack Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --text-light: #64748b;
  --primary: #0f172a;
  --border: #f1f5f9;
  --s-green: #10b981;
  --s-blue: #3b82f6;
  --s-yellow: #f59e0b;
  --s-red: #ef4444;
  --radius-lg: 24px;
  --radius-md: 16px;
  --shadow: 0 4px 20px -2px rgba(0,0,0,0.05);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; outline: none; }
body { 
    background-color: var(--bg);
    background-image: radial-gradient(at 0% 0%, hsla(210,100%,98%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(210,100%,96%,1) 0, transparent 50%);
    color: var(--text); 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    padding-bottom: 80px;
    min-height: 100vh;
}

/* HEADER & TOOLS */
.header { 
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 14px 20px; 
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.3);
}
.brand { display: flex; align-items: center; gap: 10px; }
.logo-sq { background: var(--primary); color: white; width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; }

.search-container { padding: 10px 20px; background: white; border-bottom: 1px solid var(--border); }
.search-bar { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1.5px solid var(--border); background: #f8fafc; font-family: inherit; font-size: 14px; font-weight: 600; transition: 0.2s; }
.search-bar:focus { border-color: var(--s-blue); background: white; }

/* RACK DESIGN */
.container { max-width: 500px; margin: 0 auto; padding: 12px; }
.level-head { display: flex; align-items: center; gap: 10px; margin: 24px 0 12px 4px; }
.level-head span { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-light); }
.level-line { flex: 1; height: 1px; background: var(--border); }

.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

.card { 
    background: var(--surface); border-radius: var(--radius-md); padding: 14px;
    border: 1px solid var(--surface); box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 8px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
}
.card:active { transform: scale(0.92); box-shadow: none; background: #f1f5f9; }
.card.hidden { display: none; }

.card-id { font-weight: 800; font-size: 13px; color: var(--text-light); }
.card-ref { font-size: 12px; font-weight: 700; color: var(--text); min-height: 30px; line-height: 1.2; word-break: break-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.time-bar { width: 100%; height: 5px; background: #f1f5f9; border-radius: 10px; overflow: hidden; margin-top: auto; }
.time-fill { height: 100%; transition: width 0.8s ease-in-out; }

/* MODALS */
.view { display: none; animation: fadeIn 0.3s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } }

.modal { background: var(--surface); padding: 24px; border-radius: var(--radius-lg); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); margin-top: 10px; border: 1px solid var(--border); }

.btn-back { border: none; background: #f1f5f9; font-weight: 700; color: var(--text); padding: 10px 16px; border-radius: 12px; margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; }

input { width: 100%; padding: 16px; border-radius: 14px; border: 1.5px solid var(--border); background: #f8fafc; font-family: inherit; font-size: 16px; margin-bottom: 12px; transition: 0.2s; }
input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05); }

.btn-save { width: 100%; padding: 18px; border-radius: 16px; background: var(--primary); color: white; border: none; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2); }
.btn-del { width: 100%; padding: 18px; border-radius: 16px; background: #fee2e2; color: var(--s-red); border: none; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 10px; }

.status-pill { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 10px; font-size: 11px; font-weight: 800; margin-bottom: 16px; text-transform: uppercase; }

/* RECHERCHE VIDE */
#search-empty { text-align: center; padding: 40px; color: var(--text-light); display: none; }
</style>
</head>
<body>

<div class="header">
    <div class="brand">
        <div class="logo-sq">AU</div>
        <div style="font-weight: 800; font-size: 17px;">Smart Rack</div>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
        <div id="sync-dot" style="width:8px; height:8px; border-radius:50%; background:#cbd5e1;"></div>
    </div>
</div>

<div class="search-container" id="search-box">
    <input type="text" class="search-bar" id="search-input" placeholder="🔍 Rechercher une référence ou un rack..." oninput="filterRack()">
</div>

<div id="view-rack" class="view active">
    <div class="container" id="rack-grid"></div>
    <div id="search-empty">Aucun résultat trouvé...</div>
</div>

<div id="view-emp" class="view">
    <div class="container">
        <button class="btn-back" onclick="showRack()">← Retour au plan</button>
        
        <div id="form-add" class="modal">
            <h2 id="add-id-label" style="font-weight:800; font-size: 28px; margin-bottom: 8px;"></h2>
            <p style="color: var(--text-light); font-size: 14px; margin-bottom: 20px;">Dépôt d'une nouvelle palette</p>
            <input type="text" id="inp-ref" placeholder="Référence palette" autocomplete="off">
            <input type="text" id="inp-note" placeholder="Notes (Optionnel)" autocomplete="off">
            <button class="btn-save" onclick="addPal()">Valider l'entrée</button>
        </div>

        <div id="form-det" class="modal" style="display:none;">
            <div id="det-pill" class="status-pill"></div>
            <h2 id="det-id" style="font-size:36px; font-weight:800; margin-bottom: 4px;"></h2>
            <p id="det-ref" style="font-size:18px; font-weight:700; color: var(--primary); margin-bottom: 20px;"></p>
            
            <div style="background:#f8fafc; padding:18px; border-radius:16px; margin-bottom:20px; border:1px solid var(--border);">
                <div style="font-size:10px; font-weight:800; color: var(--text-light); text-transform: uppercase; margin-bottom: 6px;">Notes logistiques</div>
                <div id="det-note" style="font-weight:600; font-size:14px; line-height:1.5;"></div>
            </div>
            
            <p id="det-date" style="font-size:12px; color:var(--text-light); text-align:center; margin-bottom: 16px;"></p>
            <button class="btn-del" onclick="delPal()">Libérer l'emplacement</button>
        </div>
    </div>
</div>

<script>
const FIREBASE_URL = "https://rac-attente-fin-delais-default-rtdb.europe-west1.firebasedatabase.app/rack.json";

let state = {};
let currentId = null;

// RETOUR HAPTIQUE (Vibration sur Android)
function haptic() { if(window.navigator.vibrate) window.navigator.vibrate(10); }

function getStatusInfo(date) {
    if(!date) return null;
    const jours = Math.floor((new Date() - new Date(date)) / 86400000);
    const pct = Math.min((jours / 28) * 100, 100);
    
    if(jours >= 28) return { col: 'var(--s-red)', lab: jours+'j - URGENT', pct: 100 };
    if(jours >= 21) return { col: 'var(--s-yellow)', lab: jours+'j - ATTENTE', pct: pct };
    if(jours >= 15) return { col: 'var(--s-blue)', lab: jours+'j - SUIVI', pct: pct };
    return { col: 'var(--s-green)', lab: jours+'j - OK', pct: pct };
}

async function refresh() {
    const dot = document.getElementById('sync-dot');
    try {
        const r = await fetch(FIREBASE_URL);
        state = await r.json() || {};
        render();
        dot.style.background = 'var(--s-green)';
    } catch(e) { dot.style.background = 'var(--s-red)'; }
}

async function sync() {
    await fetch(FIREBASE_URL, { method:'PUT', body: JSON.stringify(state) });
    refresh();
}

function render() {
    const cont = document.getElementById('rack-grid');
    cont.innerHTML = '';
    ['D','C','B','A'].forEach(niv => {
        const h = document.createElement('div');
        h.className = 'level-head';
        h.innerHTML = `<span>Niveau ${niv}</span><div class="level-line"></div>`;
        cont.appendChild(h);

        const g = document.createElement('div');
        g.className = 'grid';
        for(let i=1; i<=6; i++) {
            const id = niv+i;
            const p = state[id];
            const info = getStatusInfo(p?.date);
            
            const c = document.createElement('div');
            c.className = 'card';
            c.id = `card-${id}`;
            c.innerHTML = `
                <div class="card-id">${id}</div>
                <div class="card-ref">${p ? p.ref : '---'}</div>
                ${p ? `<div class="time-bar"><div class="time-fill" style="width:${info.pct}%; background:${info.col}"></div></div>` : ''}
            `;
            c.onclick = () => openEmp(id);
            g.appendChild(c);
        }
        cont.appendChild(g);
    });
}

function filterRack() {
    const val = document.getElementById('search-input').value.toUpperCase();
    const cards = document.querySelectorAll('.card');
    let hasResult = false;

    cards.forEach(card => {
        const ref = card.querySelector('.card-ref').innerText.toUpperCase();
        const id = card.querySelector('.card-id').innerText.toUpperCase();
        if(ref.includes(val) || id.includes(val)) {
            card.classList.remove('hidden');
            hasResult = true;
        } else {
            card.classList.add('hidden');
        }
    });
    
    document.getElementById('search-empty').style.display = hasResult ? 'none' : 'block';
}

function openEmp(id) {
    haptic();
    currentId = id;
    const p = state[id];
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-emp').classList.add('active');
    document.getElementById('search-box').style.display = 'none';
    
    if(p) {
        document.getElementById('form-add').style.display = 'none';
        document.getElementById('form-det').style.display = 'block';
        const info = getStatusInfo(p.date);
        document.getElementById('det-id').textContent = id;
        document.getElementById('det-ref').textContent = p.ref;
        document.getElementById('det-note').textContent = p.note || "Aucune note.";
        document.getElementById('det-date').textContent = "Entrée le " + new Date(p.date).toLocaleDateString('fr-FR');
        document.getElementById('det-pill').textContent = info.lab;
        document.getElementById('det-pill').style.background = info.col + '15';
        document.getElementById('det-pill').style.color = info.col;
    } else {
        document.getElementById('form-add').style.display = 'block';
        document.getElementById('form-det').style.display = 'none';
        document.getElementById('add-id-label').textContent = id;
        setTimeout(() => document.getElementById('inp-ref').focus(), 400); // Focus auto
    }
}

function addPal() {
    const ref = document.getElementById('inp-ref').value;
    if(!ref) return;
    haptic();
    state[currentId] = { ref: ref, note: document.getElementById('inp-note').value, date: new Date().toISOString() };
    document.getElementById('inp-ref').value = '';
    document.getElementById('inp-note').value = '';
    sync();
    showRack();
}

function delPal() {
    if(confirm("Confirmer la sortie de cette palette ?")) {
        haptic();
        delete state[currentId];
        sync();
        showRack();
    }
}

function showRack() {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-rack').classList.add('active');
    document.getElementById('search-box').style.display = 'block';
}

window.onload = refresh;
setInterval(refresh, 20000);
</script>
</body>
</html>
