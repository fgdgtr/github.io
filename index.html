<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AUEM — Rack Attente (Auto)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0ede8; --surface: #faf8f5; --card: #ffffff;
  --border: #ddd9d2; --border2: #c8c3bb;
  --text: #1c1917; --text2: #78716c; --text3: #a8a29e;
  --s-green: #16a34a; --s-blue: #2563eb; --s-yellow: #d97706; --s-red: #dc2626;
  --r: 12px; --r-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:14px; min-height:100vh; padding-bottom:20px; }

/* HEADER */
.header { background:var(--surface); border-bottom:2px solid var(--text); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo { width:36px; height:36px; background:var(--text); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:8px; color:var(--bg); font-weight:700; }
.sync-dot { width:8px; height:8px; border-radius:50%; background:var(--text3); }
.sync-dot.ok { background:var(--s-green); box-shadow: 0 0 5px var(--s-green); }
.sync-dot.loading { background:var(--s-yellow); animation: blink .7s infinite alternate; }
@keyframes blink { to { opacity: 0.2; } }

/* LEGENDE */
.legend { display:grid; grid-template-columns: repeat(2, 1fr); gap:6px; padding:10px 14px; background:var(--surface); border-bottom:1px solid var(--border); font-size:10px; font-weight:700; }
.leg-item { display:flex; align-items:center; gap:6px; }

/* RACK VIEW */
.rack-body { padding:12px; }
.etage-sec { border-radius:var(--r); overflow:hidden; margin-bottom:12px; border:1.5px solid var(--border2); background:white; }
.etage-hd { padding:8px 12px; font-weight:700; background:#f1f1f1; border-bottom:1px solid var(--border2); display:flex; justify-content:space-between; }
.emp-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border2); }
.emp-card { background:white; padding:10px; min-height:85px; cursor:pointer; display:flex; flex-direction:column; border-left: 5px solid #eee; transition: background 0.2s; }
.emp-card:active { background: #f9f9f9; }
.emp-id { font-weight:700; font-size:15px; color: var(--text); }
.ep-ref { font-size:11px; margin-top:4px; font-family:'IBM Plex Mono'; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* COLORS BASED ON TIME */
.sg { border-left-color: var(--s-green) !important; }
.sb { border-left-color: var(--s-blue) !important; }
.sy { border-left-color: var(--s-yellow) !important; }
.sr { border-left-color: var(--s-red) !important; animation: pulseRed 2s infinite; }
@keyframes pulseRed { 50% { background: #fff1f1; } }

/* EMPLACEMENT VIEW */
.view { display:none; }
.view.active { display:block; }
.section { background:white; border:1.5px solid var(--border); border-radius:var(--r); padding:15px; margin:12px; }
.inp { width:100%; padding:12px; margin-bottom:10px; border:1.5px solid var(--border); border-radius:6px; font-family: inherit; font-size: 14px; }
.btn-main { width:100%; background:var(--text); color:white; padding:14px; border:none; border-radius:6px; font-weight:700; cursor:pointer; }
.pal-card { background:var(--bg); padding:12px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; border-left: 4px solid #ccc; }
.btn-back { background:var(--text); color:white; border:none; padding:10px 16px; border-radius:6px; margin:12px; cursor:pointer; font-weight:600; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex; align-items:center; gap:10px;">
    <div class="logo">AUEM</div>
    <div><div style="font-weight:700">Rack Attente</div><div style="font-size:10px; color:var(--text3)">Mise à jour automatique</div></div>
  </div>
  <div class="sync-dot" id="sync-dot"></div>
</div>

<div class="legend">
  <div class="leg-item" style="color:var(--s-green)">● Moins de 15j</div>
  <div class="leg-item" style="color:var(--s-blue)">● 15j à 21j</div>
  <div class="leg-item" style="color:var(--s-yellow)">● 21j à 28j</div>
  <div class="leg-item" style="color:var(--s-red)">● + de 28j (URGENT)</div>
</div>

<div class="view active" id="view-rack">
  <div class="rack-body" id="rack-grid"></div>
</div>

<div class="view" id="view-emp">
  <button class="btn-back" onclick="showRack()">← Retour au Rack</button>
  <div class="section">
    <h3 id="emp-title" style="margin-bottom:12px;">Emplacement</h3>
    <input class="inp" id="inp-ref" placeholder="N° de commande ou palette">
    <input class="inp" id="inp-note" placeholder="Note (Transporteur, client...)">
    <button class="btn-main" onclick="addPalette()">Enregistrer l'entrée</button>
  </div>
  <div id="palette-list" style="padding:0 12px;"></div>
</div>

<script>
// --- CONFIGURATION ---
const ETAGES = ['D','C','B','A'];
const FIREBASE = 'https://rac-attente-fin-delais-default-rtdb.europe-west1.firebasedatabase.app/rack.json';

let state = {};
let currentEmp = null;

// --- LOGIQUE DE TEMPS ---
function getStatus(timestamp) {
    if (!timestamp) return 'green';
    const jours = Math.floor((new Date() - new Date(timestamp)) / (1000 * 60 * 60 * 24));
    
    if (jours >= 28) return 'red';
    if (jours >= 21) return 'yellow';
    if (jours >= 15) return 'blue';
    return 'green';
}

// --- SYNCHRONISATION ---
async function loadFromServer() {
    const dot = document.getElementById('sync-dot');
    dot.className = 'sync-dot loading';
    try {
        const res = await fetch(FIREBASE);
        state = await res.json() || {};
        renderRack();
        dot.className = 'sync-dot ok';
    } catch(e) { 
        dot.className = 'sync-dot';
        console.error("Erreur de synchro");
    }
}

async function saveToServer() {
    await fetch(FIREBASE, { method:'PUT', body: JSON.stringify(state) });
    loadFromServer();
}

// --- RENDER ---
function renderRack() {
    const grid = document.getElementById('rack-grid');
    grid.innerHTML = '';

    ETAGES.forEach(etage => {
        const sec = document.createElement('div');
        sec.className = 'etage-sec';
        sec.innerHTML = `<div class="etage-hd">Étage ${etage}</div>`;
        const g = document.createElement('div'); g.className = 'emp-grid';
        
        for(let i=1; i<=6; i++) {
            const id = etage+i;
            const pals = state[id]?.palettes || [];
            let colorClass = '';
            
            if(pals.length) {
                // Déterminer la couleur selon la palette la plus vieille
                const critStat = pals.map(p => getStatus(p.date));
                if(critStat.includes('red')) colorClass = 'sr';
                else if(critStat.includes('yellow')) colorClass = 'sy';
                else if(critStat.includes('blue')) colorClass = 'sb';
                else colorClass = 'sg';
            }
            
            const card = document.createElement('div');
            card.className = `emp-card ${colorClass}`;
            card.innerHTML = `
                <div class="emp-id">${id}</div>
                <div class="ep-ref">${pals.length ? pals[0].ref : '<span style="color:#ddd">Vide</span>'}</div>
                ${pals.length > 1 ? `<div style="font-size:9px; color:var(--s-blue); font-weight:700;">+ ${pals.length-1} palette(s)</div>` : ''}
            `;
            card.onclick = () => openEmp(id);
            g.appendChild(card);
        }
        sec.appendChild(g);
        grid.appendChild(sec);
    });
}

function openEmp(id) {
    currentEmp = id;
    document.getElementById('emp-title').textContent = "Emplacement " + id;
    showView('view-emp');
    renderPalList();
}

function renderPalList() {
    const list = document.getElementById('palette-list');
    list.innerHTML = '';
    const pals = state[currentEmp]?.palettes || [];
    
    pals.forEach((p, i) => {
        const color = getStatus(p.date);
        const dateObj = new Date(p.date);
        const dateTxt = dateObj.toLocaleDateString('fr-FR') + " (" + Math.floor((new Date() - dateObj)/(1000*60*60*24)) + "j)";
        
        const div = document.createElement('div');
        div.className = 'pal-card';
        div.style.borderLeftColor = `var(--s-${color})`;
        div.innerHTML = `
            <div>
                <div class="ep-ref">${p.ref}</div>
                <div style="font-size:10px; color:var(--text2)">Arrivé le ${dateTxt}</div>
                <div style="font-size:10px; font-style:italic;">${p.note || ''}</div>
            </div>
            <button onclick="delPal(${i})" style="background:none; border:none; font-size:20px; color:var(--text3); cursor:pointer;">✕</button>
        `;
        list.appendChild(div);
    });
}

// --- ACTIONS ---
function addPalette() {
    const ref = document.getElementById('inp-ref').value.trim();
    if(!ref) return;
    
    if(!state[currentEmp]) state[currentEmp] = { palettes: [] };
    
    state[currentEmp].palettes.push({
        ref: ref,
        note: document.getElementById('inp-note').value,
        date: new Date().toISOString() // La date est générée ici automatiquement
    });
    
    document.getElementById('inp-ref').value = '';
    document.getElementById('inp-note').value = '';
    saveToServer();
}

function delPal(i) {
    if(confirm("Retirer cette palette ?")) {
        state[currentEmp].palettes.splice(i, 1);
        saveToServer();
    }
}

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}

function showRack() { showView('view-rack'); }

// Initialisation
window.onload = loadFromServer;
setInterval(loadFromServer, 60000); // Rafraîchir toutes les minutes
</script>
</body>
</html>
